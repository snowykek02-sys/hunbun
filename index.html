<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honey...</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9ec4, #ffd6e7);
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .container {
        text-align: center;
        background: rgba(255,255,255,0.9);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    button {
        padding: 15px 35px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        margin: 10px;
    }

    #yes { background:#ff4f81; color:white; }
    #no { background:#777; color:white; }
</style>
</head>

<body>

<div class="container">
    <h1>Honey...</h1>

    <p>Will you be my girlfriend?</p>

    <img src="https://media.giphy.com/media/3oKIPipgrovqOodyYo/giphy.gif"
         style="width:200px;border-radius:15px;margin:10px;">

    <div>
        <button id="yes">Yes ❤️</button>
        <button id="no">No 😢</button>
    </div>
</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");

function betterEffects() {
    const emojis = ["❤️", "🎉", "✨", "💖", "🌟"];

    for (let i = 0; i < 120; i++) {
        const el = document.createElement("div");
        el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

        // 🌍 spawn anywhere on screen
        const startX = Math.random() * window.innerWidth;
        const startY = Math.random() * window.innerHeight;

        el.style.position = "fixed";
        el.style.left = startX + "px";
        el.style.top = startY + "px";

        // 🎨 random size
        const size = 15 + Math.random() * 35;
        el.style.fontSize = size + "px";

        el.style.pointerEvents = "none";
        el.style.zIndex = 9999;
        el.style.opacity = 1;

        document.body.appendChild(el);

        // 🚀 random movement direction (firework feel)
        const xMove = (Math.random() - 0.5) * 400;
        const yMove = (Math.random() - 0.5) * 400;

        setTimeout(() => {
            el.style.transition = "all 2s ease-out";
            el.style.transform = `translate(${xMove}px, ${yMove}px) rotate(${Math.random()*360}deg)`;
            el.style.opacity = 0;
        }, 10);

        setTimeout(() => el.remove(), 2500);
    }
}

yesBtn.onclick = () => {

    betterEffects();

    setTimeout(() => {
        document.body.innerHTML = `
        <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            height:100vh;
            background:linear-gradient(135deg,#ff9ec4,#ffd6e7);
            font-family:Arial,sans-serif;
            text-align:center;
            color:white;">

            <h1 style="font-size:4rem;">that's what I thought 😌</h1>

            <img src="https://media.giphy.com/media/3XZwxvubrEtE5z4HE0/giphy.gif"
                 style="width:250px;border-radius:15px;margin:20px 0;">

            <h2>I love you so much ml</h2>

            <p>Thank you</p>

        </div>`;
    }, 900);
};

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);
    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
