<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Honey...</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9ec4, #ffd6e7);
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .container {
        text-align: center;
        background: rgba(255,255,255,0.9);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
        color: #ff4f81;
        font-size: 3em;
    }

    p {
        color: #555;
        margin-bottom: 30px;
    }

    button {
        padding: 15px 35px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
        margin: 10px;
    }

    #yes {
        background: #ff4f81;
        color: white;
    }

    #yes:hover {
        transform: scale(1.1);
    }

    #no {
        background: #777;
        color: white;
        position: relative;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Honey...</h1>

<img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExb3llaTFvbGVpZWx4c2plNXVtamszcGM1Z2xqcTJhaTk5bmY3ZTY0byZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3XZwxvubrEtE5z4HE0/giphy.gif"
     style="width:220px;border-radius:15px;margin:15px 0;">
    

    <p>Will you be my girlfriend?</p>

    <button id="yes">Yes ❤️</button>
    <button id="no">No 😢</button>

</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");

yesBtn.onclick = () => {

    // 💖 heart burst effect
    for (let i = 0; i < 60; i++) {
        const heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.style.position = "fixed";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "100vh";
        heart.style.fontSize = (20 + Math.random() * 30) + "px";
        heart.style.transition = "all 2.5s linear";
        heart.style.pointerEvents = "none";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.style.top = "-10vh";
            heart.style.opacity = "0";
        }, 50);

        setTimeout(() => heart.remove(), 3000);
    }

    document.body.innerHTML = `
    <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        height:100vh;
        background:linear-gradient(135deg,#ff9ec4,#ffd6e7);
        font-family:Arial,sans-serif;
        text-align:center;
        color:white;">

        <h1 style="font-size:4rem;">that's what I thought 😌</h1>

        <h2>I love you so much ml</h2>

        <p>Thank you</p>

    </div>`;
};

function moveButton() {
    const padding = 20;
    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);
</script>

</body>
</html>
